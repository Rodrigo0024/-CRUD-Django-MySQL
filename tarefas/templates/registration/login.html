{% extends 'tarefas/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 card p-4 shadow-sm">
        <h3 class="text-center">Login</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <p class="mt-3 text-center">Não tem conta? <a href="{% url 'cadastrar' %}">Cadastre-se</a></p>
    </div>
</div>
{% endblock %}
